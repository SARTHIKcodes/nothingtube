<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nothingtube</title>
    <style>
        body {
            background-color: black;
        }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 25px;
        padding: 20px;
        max-width: 1600px;
        margin: 0 auto;
      }
      .box {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      .image-container {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .info {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .images{
        width: 100%;
        max-width: 300px;
        height: auto;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 25px;
        
        transition: all 0.3s ease;
         -webkit-filter: grayscale(100%); /* Safari 6.0 - 9.0 */
    filter: grayscale(100%);
        
      }

      .images:hover {
          -webkit-filter: blur(2px); 
          filter: blur(0.7px);
          transform: scale(1.1);
                    
      }

        .songname {
            color: white;
            font-size: clamp(18px, 5vw, 24px);
            margin-top: 15px;
            font-family: Arial, Helvetica, sans-serif;
            margin-bottom: 0%;
            word-wrap: break-word;
           
        }
        .artist {
            color: white;
            font-size: clamp(14px, 4vw, 18px);
            margin-top: 10px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            word-wrap: break-word;
            
        }

        a{
            color: orange;
            text-decoration: none;
            cursor: pointer;
        }

        a:hover {
            text-decoration: underline;
            color: white;
            opacity: 0.8;
        }
        

       
    
      @media (max-width: 1200px) {
        .grid {
          grid-template-columns: repeat(3, 1fr);
          gap: 15px;
          padding: 15px;
        }
      }

      @media (max-width: 768px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 12px;
          padding: 12px;
        }
        .images {
          max-width: 250px;
        }
      }

      @media (max-width: 480px) {
        .grid {
          grid-template-columns: 1fr;
          gap: 15px;
          padding: 10px;
        }
        .images {
          max-width: 100%;
          width: 100%;
        }
        .songname {
          font-size: 18px;
          margin-top: 10px;
        }
        .artist {
          font-size: 14px;
          margin-top: 8px;
        }
      }
    </style>
</head>
<body>
